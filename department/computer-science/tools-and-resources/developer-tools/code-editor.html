<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Malone Global University - This page contains a code editor for live rendering of html. Purpose is to test code html and css to see it rendered in real time.">
  <title>Code Editor | Computer Science Department | Malone Global University</title>
  <link rel="icon" href="/image/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/component/main.css" />

<style>
  #editor { width: 100%; height: 150px; }
  iframe { width: 100%; height: 1200px; border: 1px solid #ccc; margin-top: 10px; }
</style>
  </head>
<!-- ========== BODY ========== -->
<body id="top" data-uploaded="8-20-2025" data-updated="5-7-2026">

<!-- ========== HEADER ========== -->
<div id="header-placeholder"></div>

<script>
fetch('/component/header.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('header-placeholder').innerHTML = data;

    const script = document.createElement('script');
    script.src = '/component/main.js';
    document.body.appendChild(script);
  });
</script> 

<!-- ========== HERO ========== -->
<main>
<h1>Lesson 1: HTML Basics</h1>
<p>Type HTML below and see the live preview.</p>
<textarea id="editor"></textarea>
<iframe id="preview"></iframe>

<!-- ========== BOTTOM PAGE NAVIGATION ========== -->
<div id="bottomnav-placeholder"></div>
  </main>

<!-- ========== FOOTER ========== -->
<div id="footer-placeholder"></div>
<script>
fetch('/component/footer.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('footer-placeholder').innerHTML = data;

    const uploaded = document.body.dataset.uploaded;
    const updated = document.body.dataset.updated;

    document.getElementById('page-dates').textContent =
      `Uploaded: ${uploaded} | Updated: ${updated}`;
  });
</script>
<script>
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');

  function updatePreview() {
    preview.srcdoc = editor.value;
  }

  editor.addEventListener('input', updatePreview);
  updatePreview(); // initial load
</script>
<script src="/component/main.js"></script>
</body>
</html>
