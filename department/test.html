<!-- ========== BODY ========== -->

<!-- ========== HEADER ========== -->
<div id="header-placeholder"></div>
<script>
fetch('/component/header.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('header-placeholder').innerHTML = data;

    const script = document.createElement('script');
    script.src = '/component/main.js';
    document.body.appendChild(script);
  });
</script> 

 <!-- ========== HERO ========== -->

<!-- ========== BOTTOM PAGE NAVIGATION ========== -->

</main>

<!-- ========== FOOTER ========== -->
<div id="footer-placeholder"></div>

<script>
fetch('/component/bottom-nav.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('bottom-nav-placeholder').innerHTML = data;
  });

fetch('/component/footer.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('footer-placeholder').innerHTML = data;

    const uploaded = document.body.dataset.uploaded;
    const updated = document.body.dataset.updated;

    const pageDates = document.getElementById('page-dates');

    if (pageDates) {
      pageDates.textContent = `Uploaded: ${uploaded} | Updated: ${updated}`;
    }
  });
</script>
