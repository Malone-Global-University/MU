
<style>
  .era { cursor:pointer; transition: opacity .15s; }
  .era:hover { opacity:.85; }
  .era-label { font-family: var(--font-sans); font-size:12px; font-weight:500; }
  .era-year  { font-family: var(--font-sans); font-size:11px; }
  .detail-panel { background:var(--color-background-primary); border:0.5px solid var(--color-border-secondary); border-radius:12px; padding:16px 20px; margin:16px 0 0; min-height:140px; transition:all .2s; }
  .detail-panel h3 { margin:0 0 4px; font-size:15px; font-weight:500; color:var(--color-text-primary); }
  .detail-panel .years { font-size:12px; color:var(--color-text-secondary); margin:0 0 10px; }
  .detail-panel ul { margin:0; padding-left:18px; }
  .detail-panel li { font-size:13px; color:var(--color-text-secondary); line-height:1.6; margin-bottom:2px; }
  .ask-btn { margin-top:12px; font-size:12px; background:transparent; border:0.5px solid var(--color-border-secondary); border-radius:6px; padding:4px 10px; cursor:pointer; color:var(--color-text-secondary); }
  .ask-btn:hover { background:var(--color-background-secondary); }
</style>

<h2 class="sr-only">Hip-hop history timeline from the 1950s to the present, showing eight major eras with clickable detail panels.</h2>

<svg width="100%" viewBox="0 0 680 220" role="img">
  <title>Hip-Hop Timeline</title>
  <desc>A colour-coded horizontal timeline of hip-hop history across eight eras from pre-history to the streaming age.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Timeline spine -->
  <line x1="28" y1="130" x2="652" y2="130" stroke="var(--color-border-secondary)" stroke-width="0.5"/>

  <!-- ERA DATA encoded in rect positions; onclick sets active era -->
  <!-- Era 0: Pre-History -->
  <g class="era" onclick="setEra(0)">
    <rect id="b0" x="28" y="100" width="68" height="60" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="era-label" x="62" y="126" text-anchor="middle" fill="#3C3489">Pre-History</text>
    <text class="era-year"  x="62" y="140" text-anchor="middle" fill="#534AB7">1950s–72</text>
    <!-- dot on spine -->
    <circle cx="62" cy="130" r="3" fill="#534AB7"/>
  </g>

  <!-- Era 1: Birth -->
  <g class="era" onclick="setEra(1)">
    <rect id="b1" x="102" y="68" width="72" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="era-label" x="138" y="94"  text-anchor="middle" fill="#085041">Birth of</text>
    <text class="era-label" x="138" y="108" text-anchor="middle" fill="#085041">Hip-Hop</text>
    <text class="era-year"  x="138" y="122" text-anchor="middle" fill="#0F6E56">1973–78</text>
    <circle cx="138" cy="130" r="3" fill="#0F6E56"/>
    <line x1="138" y1="128" x2="138" y2="130" stroke="#0F6E56" stroke-width="0.5"/>
  </g>

  <!-- Era 2: Recorded Rap -->
  <g class="era" onclick="setEra(2)">
    <rect id="b2" x="180" y="100" width="76" height="60" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text class="era-label" x="218" y="126" text-anchor="middle" fill="#633806">Recorded</text>
    <text class="era-label" x="218" y="140" text-anchor="middle" fill="#633806">Rap</text>
    <text class="era-year"  x="218" y="154" text-anchor="middle" fill="#854F0B">1979–82</text>
    <circle cx="218" cy="130" r="3" fill="#854F0B"/>
  </g>

  <!-- Era 3: Old School -->
  <g class="era" onclick="setEra(3)">
    <rect id="b3" x="262" y="68" width="74" height="60" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="era-label" x="299" y="94"  text-anchor="middle" fill="#711B0C">Old School</text>
    <text class="era-label" x="299" y="108" text-anchor="middle" fill="#711B0C">Era</text>
    <text class="era-year"  x="299" y="122" text-anchor="middle" fill="#993C1D">1982–86</text>
    <circle cx="299" cy="130" r="3" fill="#993C1D"/>
    <line x1="299" y1="128" x2="299" y2="130" stroke="#993C1D" stroke-width="0.5"/>
  </g>

  <!-- Era 4: Golden Age -->
  <g class="era" onclick="setEra(4)">
    <rect id="b4" x="342" y="100" width="74" height="60" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="era-label" x="379" y="126" text-anchor="middle" fill="#3C3489">Golden</text>
    <text class="era-label" x="379" y="140" text-anchor="middle" fill="#3C3489">Age</text>
    <text class="era-year"  x="379" y="154" text-anchor="middle" fill="#534AB7">1986–92</text>
    <circle cx="379" cy="130" r="3" fill="#534AB7"/>
  </g>

  <!-- Era 5: Gangsta -->
  <g class="era" onclick="setEra(5)">
    <rect id="b5" x="422" y="68" width="74" height="60" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
    <text class="era-label" x="459" y="94"  text-anchor="middle" fill="#791F1F">Gangsta</text>
    <text class="era-label" x="459" y="108" text-anchor="middle" fill="#791F1F">& Regional</text>
    <text class="era-year"  x="459" y="122" text-anchor="middle" fill="#A32D2D">1988–96</text>
    <circle cx="459" cy="130" r="3" fill="#A32D2D"/>
    <line x1="459" y1="128" x2="459" y2="130" stroke="#A32D2D" stroke-width="0.5"/>
  </g>

  <!-- Era 6: Commercial -->
  <g class="era" onclick="setEra(6)">
    <rect id="b6" x="502" y="100" width="74" height="60" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text class="era-label" x="539" y="126" text-anchor="middle" fill="#27500A">Commercial</text>
    <text class="era-label" x="539" y="140" text-anchor="middle" fill="#27500A">+ Digital</text>
    <text class="era-year"  x="539" y="154" text-anchor="middle" fill="#3B6D11">1997–2015</text>
    <circle cx="539" cy="130" r="3" fill="#3B6D11"/>
  </g>

  <!-- Era 7: Streaming -->
  <g class="era" onclick="setEra(7)">
    <rect id="b7" x="582" y="68" width="70" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="era-label" x="617" y="94"  text-anchor="middle" fill="#085041">Streaming</text>
    <text class="era-label" x="617" y="108" text-anchor="middle" fill="#085041">& Global</text>
    <text class="era-year"  x="617" y="122" text-anchor="middle" fill="#0F6E56">2015–Now</text>
    <circle cx="617" cy="130" r="3" fill="#0F6E56"/>
    <line x1="617" y1="128" x2="617" y2="130" stroke="#0F6E56" stroke-width="0.5"/>
  </g>

  <!-- Tap hint -->
  <text x="340" y="200" text-anchor="middle" font-size="11" fill="var(--color-text-secondary)" font-family="var(--font-sans)">Tap any era for key moments</text>
</svg>

<div class="detail-panel" id="detail">
  <h3 id="d-title">Select an era above</h3>
  <p class="years" id="d-years"></p>
  <ul id="d-list"></ul>
  <button class="ask-btn" id="d-ask" style="display:none" onclick="askMore()">Ask Claude more about this era ↗</button>
</div>

<script>
const eras = [
  {
    title: "Pre-History",
    years: "1950s – 1972",
    color: "#534AB7",
    points: [
      "African American oral traditions: toasts, signifying, spoken-word performance",
      "Jamaican sound system culture takes hold — the direct ancestor of DJ culture",
      "The Last Poets and Gil Scott-Heron blend poetry, rhythm, and social commentary",
      "James Brown's funk records supply many of the breakbeats DJs would later sample"
    ],
    prompt: "Tell me more about the African American oral traditions and Jamaican sound systems that led to hip-hop"
  },
  {
    title: "Birth of Hip-Hop",
    years: "1973 – 1978",
    color: "#0F6E56",
    points: [
      "August 11, 1973: DJ Kool Herc hosts the Bronx party widely cited as hip-hop's founding moment",
      "Herc invents the 'breakbeat' technique — looping the instrumental break so dancers can keep going",
      "Afrika Bambaataa channels the culture into community organisation through the Universal Zulu Nation",
      "Grandmaster Flash refines DJ technique: quick-mix theory, backspin, and early scratching"
    ],
    prompt: "What was DJ Kool Herc's 1973 party and why is it so important to hip-hop history?"
  },
  {
    title: "Recorded Rap Emerges",
    years: "1979 – 1982",
    color: "#854F0B",
    points: [
      "1979: Rapper's Delight by The Sugarhill Gang becomes hip-hop's first major commercial hit",
      "1980: Kurtis Blow's The Breaks becomes the first certified gold rap single",
      "Rap crosses over from live party phenomenon to a studio recording format",
      "Record labels begin to see commercial potential in the genre"
    ],
    prompt: "How did Rapper's Delight bring hip-hop to a mainstream audience in 1979?"
  },
  {
    title: "The Old School Era",
    years: "1982 – 1986",
    color: "#993C1D",
    points: [
      "1982: Grandmaster Flash's The Message introduces social realism and street reportage into rap",
      "Drum machines like the Roland TR-808 reshape hip-hop's sonic palette",
      "Run-D.M.C. modernise rap's sound and image, pioneering the rock–rap crossover",
      "Hip-hop earns national coverage and begins touring beyond New York"
    ],
    prompt: "How did The Message change the content and direction of hip-hop lyrics?"
  },
  {
    title: "The Golden Age",
    years: "1986 – 1992",
    color: "#534AB7",
    points: [
      "Run-D.M.C. release landmark albums that push production and lyrical ambition",
      "Eric B. & Rakim's Paid in Full transforms expectations of MC craft and internal rhyme",
      "Public Enemy expand political rap into a full multimedia movement",
      "Sampling technology lets producers build dense, layered soundscapes from any record",
      "Many critics regard this as the creative peak of the entire genre"
    ],
    prompt: "Why do so many critics call 1986–1992 hip-hop's Golden Age?"
  },
  {
    title: "Gangsta Rap & Regional Expansion",
    years: "1988 – 1996",
    color: "#A32D2D",
    points: [
      "N.W.A bring West Coast gangsta rap to a national audience with Straight Outta Compton",
      "Distinct East Coast and West Coast scenes develop separate aesthetics and rivalries",
      "Tupac Shakur and The Notorious B.I.G. become the era's dominant — and most tragic — figures",
      "The East–West tension culminates in the deaths of both artists between 1996 and 1997"
    ],
    prompt: "What drove the East Coast vs West Coast rivalry in 1990s hip-hop?"
  },
  {
    title: "Commercial Dominance & the Digital Era",
    years: "1997 – 2015",
    color: "#3B6D11",
    points: [
      "Hip-hop becomes one of America's most commercially successful genres by the late 1990s",
      "Southern rap rises with Outkast, Lil Wayne, and the rise of trap production out of Atlanta",
      "Mixtape culture, music blogs, and social media upend traditional label-controlled discovery",
      "Kanye West, Drake, and Kendrick Lamar redefine what mainstream hip-hop can sound and look like",
      "Streaming begins displacing physical sales and digital downloads"
    ],
    prompt: "How did mixtape culture and the internet change how hip-hop artists built audiences?"
  },
  {
    title: "Streaming & Global Hip-Hop",
    years: "2015 – Present",
    color: "#0F6E56",
    points: [
      "Streaming platforms become the dominant mode of music consumption worldwide",
      "Hip-hop overtakes rock as the most-streamed genre in the United States",
      "Regional scenes emerge across Africa (Afrobeats), Europe, Asia, and Latin America",
      "Genre lines blur freely with pop, R&B, electronic music, and Afrobeats",
      "Artist-to-fan pipelines shorten: TikTok, SoundCloud, and YouTube replace gatekeepers"
    ],
    prompt: "How has hip-hop globalised since 2015 and what regional scenes have emerged?"
  }
];

let active = -1;

function setEra(i) {
  active = i;
  const e = eras[i];
  document.getElementById('d-title').textContent = e.title;
  document.getElementById('d-years').textContent = e.years;
  const ul = document.getElementById('d-list');
  ul.innerHTML = e.points.map(p => `<li>${p}</li>`).join('');
  document.getElementById('d-ask').style.display = 'inline-block';
}

function askMore() {
  if (active < 0) return;
  sendPrompt(eras[active].prompt);
}
</script>
