<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Digest News | The Malone Panther | Malone University</title>
  <link rel="stylesheet" href="/component/news.css">
</head>

<!-- ========== BODY ========== -->
<body id="top" data-uploaded="4-29-2026" data-updated="5-13-2026">

<!-- ========== HEADER ========== -->
<div id="header-placeholder"></div>
<script>
fetch('/component/header.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('header-placeholder').innerHTML = data;

    const script = document.createElement('script');
    script.src = '/component/main.js';
    document.body.appendChild(script);
  });
</script> 

<!-- ========== HERO ========== -->

    <link rel="stylesheet" href="/component/news.css">
  <section class="hero" role="region" aria-labelledby="hero-title">
    <h1 id="hero-title">🌍 Digest News</h1>
    <p>Latest insights, stories, and developments from across Digest.</p>
  </section>


<!--  ======== BREADCRUMB ======== -->
<nav class="breadcrumb" aria-label="Breadcrumb" id="breadcrumb"></nav>

<!--  ======== Main ======== -->
<main id="main-content" role="main">

    <section class="news-section">
      <h2>Top Stories</h2>

      <article class="card">
        
      </article>
      <article class="card">
      <h3></h3>
      <p></p>
      <a href="" class="read-more">Read More →</a>
      </article>
    </section>

<!-- ========== BOTTOM PAGE NAVIGATION ========== -->
<div id="bottom-nav-placeholder"></div>
</main>

<!-- ========== FOOTER ========== -->
<div id="footer-placeholder"></div>

<script>
fetch('/component/bottom-nav.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('bottom-nav-placeholder').innerHTML = data;
  });

fetch('/component/footer.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('footer-placeholder').innerHTML = data;

    const uploaded = document.body.dataset.uploaded;
    const updated = document.body.dataset.updated;

    const pageDates = document.getElementById('page-dates');

    if (pageDates) {
      pageDates.textContent = `Uploaded: ${uploaded} | Updated: ${updated}`;
    }
  });
</script>
</body>
</html>
