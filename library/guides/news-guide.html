<!DOCTYPE html>
<html lang="en">

 <!-- ========== HEAD ========== -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>News Guide | MGU Encyclopedia | Malone Global University</title>
  <link rel="icon" href="/image/global/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/component/dept.css" />
</head>

<!-- ========== BODY ========== -->
<body id="top" data-uploaded="5-17-2026" data-updated="5-17-2026">

<!-- ========== HEADER ========== -->
<div id="header-placeholder"></div>
<script>
fetch('/component/header.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('header-placeholder').innerHTML = data;

    const script = document.createElement('script');
    script.src = '/component/main.js';
    document.body.appendChild(script);
  });
</script> 

<!-- ========== HERO ========== -->
<section>
<h2>News Guide</h2>
</section>

<!--  ======== BREADCRUMB ======== -->
<nav class="breadcrumb" aria-label="Breadcrumb" id="breadcrumb"></nav>

<!--  ======== Main ======== -->
<main id="main-content" role="main">

<!-- ========== BOTTOM PAGE NAVIGATION ========== -->
<div id="bottom-nav-placeholder"></div>
</main>

<!-- ========== FOOTER ========== -->
<div id="footer-placeholder"></div>

<script>
fetch('/component/bottom-nav.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('bottom-nav-placeholder').innerHTML = data;
  });

fetch('/component/footer.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('footer-placeholder').innerHTML = data;

    const uploaded = document.body.dataset.uploaded;
    const updated = document.body.dataset.updated;

    const pageDates = document.getElementById('page-dates');

    if (pageDates) {
      pageDates.textContent = `Uploaded: ${uploaded} | Updated: ${updated}`;
    }
  });
</script>
</body>
</html>
