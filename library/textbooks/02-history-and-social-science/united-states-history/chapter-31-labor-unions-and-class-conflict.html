<!DOCTYPE html>

<title>Chapter 31: Labor, Unions, and Class Conflict — MGU History Series</title>
<style>

  .feature-debate .feature-box-header { background: var(--accent); color: #fde; }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
